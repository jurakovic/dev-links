<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      padding: 1.5rem 2rem;
      min-height: 100vh;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #f8fafc;
      margin-bottom: 0.75rem;
    }

    .search-input {
      display: block;
      width: 100%;
      max-width: 320px;
      margin-bottom: 1rem;
      padding: 0.3rem 0.75rem;
      background: #1a1f2e;
      border: 1px solid #1e2a3a;
      border-radius: 7px;
      color: #e2e8f0;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input::placeholder { color: #334155; }
    .search-input:focus { border-color: #2563eb; }

    /* Tag filter */
    .tag-filter {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem;
      margin-bottom: 1.5rem;
      padding: 0.75rem 1rem;
      background: #1a1f2e;
      border-radius: 7px;
      border: 1px solid #1e2a3a;
    }

    .filter-label {
      font-size: 0.7rem;
      color: #64748b;
      margin-right: 0.25rem;
    }

    .tag-btn {
      padding: 0.15rem 0.6rem;
      border-radius: 9999px;
      border: 1px solid #2d3748;
      background: transparent;
      color: #64748b;
      font-size: 0.68rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tag-btn:hover { border-color: #475569; color: #cbd5e1; }
    .tag-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }

    /* Newspaper-style columns layout */
    .groups-container {
      columns: 5;
      column-gap: 2rem;
    }

    .group {
      break-inside: avoid;
      margin-bottom: 1.25rem;
    }

    .group-header {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #475569;
      margin-bottom: 0.5rem;
      padding-bottom: 0.35rem;
      border-bottom: 1px solid #1a1f2e;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .group-count {
      font-weight: 400;
      color: #334155;
    }

    /* Tool list */
    .tool-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .tool-list li {
      display: flex;
      flex-direction: column;
      gap: 0.05rem;
      margin-bottom: 0.35rem;
    }

    .tool-list li .row {
      display: flex;
      align-items: baseline;
      gap: 0.35rem;
    }

    .tool-list a {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: #94a3b8;
      text-decoration: none;
      font-size: 1.2rem;
      transition: color 0.12s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tool-favicon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0.85;
    }

    .tool-list a:hover { color: #60a5fa; }

    .tool-desc {
      font-size: 0.72rem;
      color: #334155;
      line-height: 1.3;
    }

    .secondary-tags {
      display: flex;
      gap: 0.2rem;
      flex-shrink: 0;
    }

    .stag {
      font-size: 0.58rem;
      color: #334155;
      background: #1a1f2e;
      border: 1px solid #1e2a3a;
      border-radius: 9999px;
      padding: 0 0.35rem;
      line-height: 1.6;
    }

    .result-count {
      font-size: 0.72rem;
      color: #334155;
      margin-bottom: 1rem;
    }

    .no-results {
      color: #475569;
      font-size: 0.875rem;
      padding: 3rem 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Dev Tools</h1>
  <input class="search-input" id="searchInput" type="search" placeholder="Search tools…" autocomplete="off">
  <div class="tag-filter" id="tagFilter"></div>
  <div class="result-count" id="resultCount"></div>
  <div class="groups-container" id="content"></div>

  <script>
    const tools = [
      { name: "IT Tools",                   url: "https://it-tools.tech/",                                       main: "utilities", tags: ["utilities"],                    desc: "Collection of handy online IT tools" },
      { name: "CyberChef",                  url: "https://gchq.github.io/CyberChef/",                            main: "utilities", tags: ["utilities", "encoding", "security"], desc: "Swiss army knife for encoding, encryption and analysis" },
      { name: "Text Compare",               url: "https://text-compare.com/",                                    main: "text",      tags: ["text"],                          desc: "Side-by-side diff of two text blocks" },
      { name: "StackEdit",                  url: "https://stackedit.io/",                                        main: "text",      tags: ["text", "markdown"],              desc: "In-browser Markdown editor with live preview" },
      { name: "ASCII Text Art Converter",   url: "https://textfancy.com/text-art/",                              main: "text",      tags: ["text", "generators"],            desc: "Convert text to decorative Unicode/ASCII art fonts" },
      { name: "GNU sed live editor",        url: "https://sed.js.org/",                                          main: "text",      tags: ["text", "regex", "cli"],          desc: "Test sed substitution commands interactively" },
      { name: "GNU grep live editor",       url: "https://grep.js.org/",                                         main: "text",      tags: ["text", "regex", "cli"],          desc: "Test grep regex patterns interactively" },
      { name: "regex101",                   url: "https://regex101.com/",                                        main: "regex",     tags: ["regex", "text"],                 desc: "Build, test and debug regular expressions" },
      { name: "Glob tester",                url: "https://globster.xyz/",                                        main: "regex",     tags: ["regex"],                         desc: "Test glob patterns against sample file paths" },
      { name: "Online JSON Viewer",         url: "http://jsonviewer.stack.hu/",                                  main: "json",      tags: ["json"],                          desc: "Format and browse JSON in a tree view" },
      { name: "JSON Online Viewer",         url: "https://json.onlineviewer.net/",                               main: "json",      tags: ["json"],                          desc: "Format and browse JSON in a tree view" },
      { name: "JSON Minifier",              url: "https://codebeautify.org/jsonminifier",                        main: "json",      tags: ["json"],                          desc: "Strip whitespace from JSON" },
      { name: "JSON Path Finder",           url: "https://jsonpathfinder.com/",                                  main: "json",      tags: ["json"],                          desc: "Click through JSON to build JSONPath expressions" },
      { name: "jsonpath online evaluator",  url: "https://jsonpath.com/",                                        main: "json",      tags: ["json"],                          desc: "Run JSONPath queries against a JSON document" },
      { name: "jq play",                    url: "https://jqplay.org/",                                          main: "json",      tags: ["json", "cli"],                   desc: "Test jq filters against JSON input in the browser" },
      { name: "XML Online Viewer",          url: "https://xml.onlineviewer.net/",                                main: "xml",       tags: ["xml"],                           desc: "Format and browse XML in a tree view" },
      { name: "Best XML Viewer Online",     url: "https://jsonformatter.org/xml-viewer",                         main: "xml",       tags: ["xml"],                           desc: "Format and browse XML with syntax highlighting" },
      { name: "Base64",                     url: "https://www.base64decode.org/",                                main: "encoding",  tags: ["encoding"],                      desc: "Encode and decode Base64 strings" },
      { name: "Base64 Image Encoder",       url: "https://www.base64-image.de/",                                 main: "encoding",  tags: ["encoding", "image"],             desc: "Convert an image file to a Base64 data URI" },
      { name: "Base64 to Image",            url: "https://base64.guru/converter/decode/image",                  main: "encoding",  tags: ["encoding", "image"],             desc: "Decode a Base64 string back to an image" },
      { name: "GZip Decompress Online",     url: "https://codebeautify.org/gzip-decompress-online",             main: "encoding",  tags: ["encoding"],                      desc: "Decompress GZip-encoded data in the browser" },
      { name: "jwt.io",                     url: "https://jwt.io/",                                              main: "security",  tags: ["security", "encoding"],          desc: "Decode, verify and generate JSON Web Tokens" },
      { name: "Certificate Decoder",        url: "https://www.sslshopper.com/certificate-decoder.html",         main: "security",  tags: ["security"],                      desc: "Parse and inspect SSL/TLS certificate details" },
      { name: "dbdiagram.io",               url: "https://dbdiagram.io/d",                                       main: "diagrams",  tags: ["diagrams", "database"],          desc: "Design database schemas with a simple DSL" },
      { name: "js-sequence-diagrams",       url: "https://bramp.github.io/js-sequence-diagrams/",               main: "diagrams",  tags: ["diagrams"],                      desc: "Draw sequence diagrams from plain text" },
      { name: "Textik",                     url: "https://textik.com/#84068a67c55ff41c",                         main: "diagrams",  tags: ["diagrams", "text"],              desc: "ASCII diagram editor for boxes and arrows" },
      { name: "Online Stopwatch",           url: "https://www.online-stopwatch.com/",                            main: "time",      tags: ["time"],                          desc: "Simple browser-based stopwatch and timer" },
      { name: "Unix Time Stamp",            url: "https://www.unixtimestamp.com/index.php",                     main: "time",      tags: ["time"],                          desc: "Convert between Unix timestamps and readable dates" },
      { name: "Crontab.guru",               url: "https://crontab.guru/",                                       main: "reference", tags: ["reference", "time"],             desc: "Visual editor and explainer for cron expressions" },
      { name: "Bash-Oneliner",              url: "https://onceupon.github.io/Bash-Oneliner/",                   main: "reference", tags: ["reference", "cli"],              desc: "Curated collection of useful Bash one-liners" },
      { name: "Free Online GUID Generator", url: "https://www.guidgenerator.com/online-guid-generator.aspx",    main: "generators",tags: ["generators"],                    desc: "Generate one or more random GUIDs/UUIDs" },
      { name: "Groovy - OneCompiler",       url: "https://onecompiler.com/groovy/",                             main: "code",      tags: ["code"],                          desc: "Run Groovy scripts in the browser" },
      { name: "Online SVG Code Editor",     url: "https://editsvgcode.com/",                                    main: "image",     tags: ["image", "code"],                 desc: "Edit SVG markup with live preview" },
    ];

    const allTags = [...new Set(tools.flatMap(t => t.tags))].sort();
    let selectedTags = new Set();
    let searchQuery = '';

    document.getElementById('searchInput').addEventListener('input', e => {
      searchQuery = e.target.value.trim().toLowerCase();
      renderContent();
    });

    function renderTagFilter() {
      const container = document.getElementById('tagFilter');
      container.innerHTML = '<span class="filter-label">Filter:</span>';

      const allBtn = document.createElement('button');
      allBtn.className = 'tag-btn' + (selectedTags.size === 0 ? ' active' : '');
      allBtn.textContent = 'All';
      allBtn.onclick = () => { selectedTags.clear(); render(); };
      container.appendChild(allBtn);

      allTags.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'tag-btn' + (selectedTags.has(tag) ? ' active' : '');
        btn.textContent = tag;
        btn.onclick = () => {
          if (selectedTags.has(tag)) selectedTags.delete(tag);
          else selectedTags.add(tag);
          render();
        };
        container.appendChild(btn);
      });
    }

    function renderContent() {
      const content = document.getElementById('content');

      const filtered = tools.filter(t =>
        (selectedTags.size === 0 || t.tags.some(tag => selectedTags.has(tag))) &&
        (searchQuery === '' || t.name.toLowerCase().includes(searchQuery))
      );

      const countEl = document.getElementById('resultCount');
      countEl.textContent = filtered.length === tools.length
        ? `${tools.length} tools`
        : `Showing ${filtered.length} of ${tools.length} tools`;

      if (filtered.length === 0) {
        content.innerHTML = '<p class="no-results">No tools match the selected filters.</p>';
        return;
      }

      const groups = {};
      filtered.forEach(tool => {
        if (!groups[tool.main]) groups[tool.main] = [];
        groups[tool.main].push(tool);
      });

      content.innerHTML = '';
      Object.keys(groups).sort().forEach(groupName => {
        const group = document.createElement('div');
        group.className = 'group';

        const header = document.createElement('div');
        header.className = 'group-header';
        header.innerHTML = `${groupName} <span class="group-count">${groups[groupName].length}</span>`;
        group.appendChild(header);

        const list = document.createElement('ul');
        list.className = 'tool-list';

        groups[groupName].forEach(tool => {
          const li = document.createElement('li');

          const row = document.createElement('div');
          row.className = 'row';

          const a = document.createElement('a');
          a.href = tool.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.title = tool.name;

          const favicon = document.createElement('img');
          favicon.className = 'tool-favicon';
          favicon.src = `https://www.google.com/s2/favicons?domain=${new URL(tool.url).hostname}&sz=32`;
          favicon.alt = '';
          a.appendChild(favicon);
          a.appendChild(document.createTextNode(tool.name));

          row.appendChild(a);

          const secondary = tool.tags.filter(t => t !== tool.main);
          if (secondary.length) {
            const tagsEl = document.createElement('span');
            tagsEl.className = 'secondary-tags';
            secondary.forEach(tag => {
              const s = document.createElement('span');
              s.className = 'stag';
              s.textContent = tag;
              tagsEl.appendChild(s);
            });
            row.appendChild(tagsEl);
          }

          li.appendChild(row);

          if (tool.desc) {
            const desc = document.createElement('span');
            desc.className = 'tool-desc';
            desc.textContent = tool.desc;
            li.appendChild(desc);
          }

          list.appendChild(li);
        });

        group.appendChild(list);
        content.appendChild(group);
      });
    }

    function render() {
      renderTagFilter();
      renderContent();
    }

    render();
  </script>
</body>
</html>
