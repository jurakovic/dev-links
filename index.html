<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dev-tools</title>
  <link rel="apple-touch-icon" sizes="180x180" href="https://jurakovic.github.io/img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="https://jurakovic.github.io/img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="https://jurakovic.github.io/img/favicon-16x16.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button, input { font-family: inherit; }

    html {
      --bg:               #0f1117;
      --bg-card:          #1a1f2e;
      --border:           #1e2a3a;
      --text:             #e2e8f0;
      --text-heading:     #f8fafc;
      --text-muted:       #94a3b8;
      --text-faint:       #475569;
      --text-dim:         #334155;
      --tag-border:       #2d3748;
      --tag-color:        #64748b;
      --tag-hover-border: #475569;
      --tag-hover-color:  #cbd5e1;
      --accent:           #2563eb;
      --link-hover:       #60a5fa;
    }

    html[data-theme="light"] {
      --bg:               #f8fafc;
      --bg-card:          #f1f5f9;
      --border:           #e2e8f0;
      --text:             #1e293b;
      --text-heading:     #0f172a;
      --text-muted:       #475569;
      --text-faint:       #94a3b8;
      --text-dim:         #94a3b8;
      --tag-border:       #cbd5e1;
      --tag-color:        #64748b;
      --tag-hover-border: #94a3b8;
      --tag-hover-color:  #1e293b;
      --accent:           #2563eb;
      --link-hover:       #1d4ed8;
    }

    body {
      font-family: ui-monospace, 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      background: var(--bg);
      color: var(--text);
      padding: 1.5rem 2rem;
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-heading);
    }

    .theme-toggle {
      background: none;
      border: none;
      color: var(--text-faint);
      font-size: 0.78rem;
      cursor: pointer;
      padding: 0;
      transition: color 0.15s;
    }

    .theme-toggle:hover { color: var(--text); }

    .search-input {
      display: block;
      width: 100%;
      max-width: 320px;
      margin-bottom: 1rem;
      padding: 0.3rem 0.75rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input::placeholder { color: var(--text-dim); }
    .search-input:focus { border-color: var(--accent); }
    .search-input::-webkit-search-cancel-button {
      cursor: pointer;
      padding: 0.4rem;
      margin-left: 0.25rem;
    }

    /* Tag filter */
    .tag-filter {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem;
      margin-bottom: 1.5rem;
      padding: 0.75rem 1rem;
      background: var(--bg-card);
      border-radius: 7px;
      border: 1px solid var(--border);
    }

    .filter-label {
      font-size: 0.7rem;
      color: var(--tag-color);
      margin-right: 0.25rem;
    }

    .tag-btn {
      padding: 0.15rem 0.6rem;
      border-radius: 9999px;
      border: 1px solid var(--tag-border);
      background: transparent;
      color: var(--tag-color);
      font-size: 0.68rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tag-btn:hover { border-color: var(--tag-hover-border); color: var(--tag-hover-color); }
    .tag-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Newspaper-style columns layout */
    .groups-container {
      columns: 300px;
      column-gap: 2rem;
    }

    .group {
      break-inside: avoid;
      margin-bottom: 2rem;
    }

    .group-header {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-faint);
      margin-bottom: 0.5rem;
      padding-bottom: 0.35rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .group-count {
      font-weight: 400;
      color: var(--text-dim);
    }

    /* Tool list */
    .tool-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .tool-list li {
      display: flex;
      flex-direction: column;
      gap: 0.05rem;
      margin-bottom: 0.65rem;
      transition: opacity 0.15s;
    }

    .tool-list li.dimmed { opacity: 0.15; }
    .group-header.dimmed { opacity: 0.15; transition: opacity 0.15s; }

    .tool-list li .row {
      display: flex;
      align-items: baseline;
      gap: 0.35rem;
    }

    .tool-list a {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 1rem;
      transition: color 0.12s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tool-favicon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0.85;
    }

    .tool-favicon.invert {
      filter: invert(1);
    }

    html[data-theme="light"] .tool-favicon.invert {
      filter: none;
    }

    .tool-list a:hover { color: var(--link-hover); }

    .tool-desc {
      font-size: 0.72rem;
      color: var(--text-dim);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: calc(0.72rem * 1.3 * 2);
    }

    .secondary-tags {
      display: flex;
      gap: 0.2rem;
      flex-shrink: 0;
    }

    .stag {
      font-size: 0.58rem;
      color: var(--text-dim);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 0 0.35rem;
      line-height: 1.6;
    }

    .view-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .result-count {
      font-size: 0.72rem;
      color: var(--text-dim);
    }

    .view-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 5px;
      overflow: hidden;
    }

    .view-btn {
      min-width: 3.5rem;
      text-align: center;
      padding: 0.15rem 0.55rem;
      border: none;
      background: transparent;
      color: var(--tag-color);
      font-size: 0.68rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .view-btn + .view-btn { border-left: 1px solid var(--border); }
    .view-btn.active { background: var(--bg-card); color: var(--text); }
    .view-btn:hover:not(.active) { color: var(--tag-hover-color); }

    .list-container {
      columns: 300px;
      column-gap: 2rem;
    }

    .list-container .tool-list li {
      break-inside: avoid;
    }

    .no-results {
      color: var(--text-faint);
      font-size: 0.875rem;
      padding: 3rem 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>dev-tools</h1>
    <button class="theme-toggle" id="themeToggle">Light</button>
  </div>
  <input class="search-input" id="searchInput" type="search" placeholder="Search tools…" autocomplete="off">
  <div class="tag-filter" id="tagFilter"></div>
  <div class="view-controls">
    <span class="result-count" id="resultCount"></span>
    <div class="view-toggle">
      <button class="view-btn active" id="viewGroups">Grouped</button>
      <button class="view-btn" id="viewList">All</button>
    </div>
  </div>
  <div id="content"></div>

  <script>
    const tools = [
      { name: "IT Tools",                   url: "https://it-tools.tech/",                                       main: "utilities", tags: ["utilities"],                     desc: "Collection of handy online IT tools" },
      { name: "CyberChef",                  url: "https://gchq.github.io/CyberChef/",                            main: "utilities", tags: ["utilities", "encoding", "security"], desc: "Swiss army knife for encoding, encryption and analysis" },
      { name: ".NET Developer Toolbox",     url: "https://toolbox.bitspire.ch/home",                             main: "utilities", tags: ["utilities"],                     desc: "Collection of online developer tools" },
      { name: "tools.simonwillison.net",    url: "https://tools.simonwillison.net/",                             main: "utilities", tags: ["utilities"],                     desc: "Miscellaneous developer tools by Simon Willison" },
      { name: "Text Compare",               url: "https://text-compare.com/",                                    main: "text",      tags: ["text"],                          desc: "Side-by-side diff of two text blocks" },
      { name: "StackEdit",                  url: "https://stackedit.io/",                                        main: "text",      tags: ["text", "markdown"],              desc: "In-browser Markdown editor with live preview" },
      { name: "ASCII Text Art Converter",   url: "https://textfancy.com/text-art/",                              main: "text",      tags: ["text", "generators"],            desc: "Convert text to decorative Unicode/ASCII art fonts" },
      { name: "GNU sed live editor",        url: "https://sed.js.org/",                                          main: "text",      tags: ["text", "regex", "cli"],          desc: "Test sed substitution commands interactively",  invertFavicon: true },
      { name: "GNU grep live editor",       url: "https://grep.js.org/",                                         main: "text",      tags: ["text", "regex", "cli"],          desc: "Test grep regex patterns interactively",        invertFavicon: true },
      { name: "regex101",                   url: "https://regex101.com/",                                        main: "regex",     tags: ["regex", "text"],                 desc: "Build, test and debug regular expressions" },
      { name: "Glob tester",                url: "https://globster.xyz/",                                        main: "regex",     tags: ["regex"],                         desc: "Test glob patterns against sample file paths" },
      { name: "Online JSON Viewer",         url: "http://jsonviewer.stack.hu/",                                  main: "json",      tags: ["json"],                          desc: "Format and browse JSON in a tree view" },
      { name: "JSON Online Viewer",         url: "https://json.onlineviewer.net/",                               main: "json",      tags: ["json"],                          desc: "Format and browse JSON in a tree view" },
      { name: "JSON Minifier",              url: "https://codebeautify.org/jsonminifier",                        main: "json",      tags: ["json"],                          desc: "Strip whitespace from JSON" },
      { name: "JSON Path Finder",           url: "https://jsonpathfinder.com/",                                  main: "json",      tags: ["json"],                          desc: "Click through JSON to build JSONPath expressions" },
      { name: "jsonpath online evaluator",  url: "https://jsonpath.com/",                                        main: "json",      tags: ["json"],                          desc: "Run JSONPath queries against a JSON document" },
      { name: "jq play",                    url: "https://jqplay.org/",                                          main: "json",      tags: ["json", "cli"],                   desc: "Test jq filters against JSON input in the browser", invertFavicon: true },
      { name: "XML Online Viewer",          url: "https://xml.onlineviewer.net/",                                main: "xml",       tags: ["xml"],                           desc: "Format and browse XML in a tree view" },
      { name: "Best XML Viewer Online",     url: "https://jsonformatter.org/xml-viewer",                         main: "xml",       tags: ["xml"],                           desc: "Format and browse XML with syntax highlighting",  invertFavicon: true },
      { name: "Base64",                     url: "https://www.base64decode.org/",                                main: "encoding",  tags: ["encoding"],                      desc: "Encode and decode Base64 strings" },
      { name: "Base64 Image Encoder",       url: "https://www.base64-image.de/",                                 main: "encoding",  tags: ["encoding", "image"],             desc: "Convert an image file to a Base64 data URI" },
      { name: "Base64 to Image",            url: "https://base64.guru/converter/decode/image",                   main: "encoding",  tags: ["encoding", "image"],             desc: "Decode a Base64 string back to an image",       invertFavicon: true },
      { name: "GZip Decompress Online",     url: "https://codebeautify.org/gzip-decompress-online",              main: "encoding",  tags: ["encoding"],                      desc: "Decompress GZip-encoded data in the browser" },
      { name: "URL Encode/Decode",          url: "https://www.url-encode-decode.com/",                           main: "encoding",  tags: ["encoding"],                      desc: "Encode and decode URL strings" },
      { name: "jwt.io",                     url: "https://jwt.io/",                                              main: "security",  tags: ["security", "encoding"],          desc: "Decode, verify and generate JSON Web Tokens" },
      { name: "Certificate Decoder",        url: "https://www.sslshopper.com/certificate-decoder.html",          main: "security",  tags: ["security"],                      desc: "Parse and inspect SSL/TLS certificate details" },
      { name: "VirusTotal",                 url: "https://www.virustotal.com/gui/home/upload",                   main: "security",  tags: ["security"],                      desc: "Scan files and URLs for malware" },
      { name: "dbdiagram.io",               url: "https://dbdiagram.io/d",                                       main: "diagrams",  tags: ["diagrams", "database"],          desc: "Design database schemas with a simple DSL" },
      { name: "js-sequence-diagrams",       url: "https://bramp.github.io/js-sequence-diagrams/",                main: "diagrams",  tags: ["diagrams"],                      desc: "Draw sequence diagrams from plain text" },
      { name: "Textik",                     url: "https://textik.com/#84068a67c55ff41c",                         main: "diagrams",  tags: ["diagrams", "text"],              desc: "ASCII diagram editor for boxes and arrows" },
      { name: "Time.is",                    url: "https://time.is/",                                             main: "time",      tags: ["time"],                          desc: "Exact current time for any time zone",          favicon: "https://time.is/favicon.ico" },
      { name: "Online Stopwatch",           url: "https://www.online-stopwatch.com/",                            main: "time",      tags: ["time"],                          desc: "Simple browser-based stopwatch and timer" },
      { name: "Unix Time Stamp",            url: "https://www.unixtimestamp.com/index.php",                      main: "time",      tags: ["time"],                          desc: "Convert between Unix timestamps and readable dates" },
      { name: "Crontab.guru",               url: "https://crontab.guru/",                                        main: "reference", tags: ["reference", "time"],             desc: "Visual editor and explainer for cron expressions" },
      { name: "Bash-Oneliner",              url: "https://onceupon.github.io/Bash-Oneliner/",                    main: "reference", tags: ["reference", "cli"],              desc: "Curated collection of useful Bash one-liners" },
      { name: "Free Online GUID Generator", url: "https://www.guidgenerator.com/online-guid-generator.aspx",     main: "generators",tags: ["generators"],                    desc: "Generate one or more random GUIDs/UUIDs" },
      { name: "Groovy - OneCompiler",       url: "https://onecompiler.com/groovy/",                              main: "code",      tags: ["code"],                          desc: "Run Groovy scripts in the browser" },
      { name: "Online SVG Code Editor",     url: "https://editsvgcode.com/",                                     main: "image",     tags: ["image", "code"],                 desc: "Edit SVG markup with live preview" },
      { name: "Photopea",                   url: "https://www.photopea.com/",                                    main: "image",     tags: ["image"],                         desc: "Full-featured online photo editor" },
    ];

    const allTags = [...new Set(tools.flatMap(t => t.tags))].sort();
    let selectedTags = new Set();
    let searchQuery = '';
    let currentView = localStorage.getItem('view') || 'groups';

    const viewGroups = document.getElementById('viewGroups');
    const viewList   = document.getElementById('viewList');

    function setView(v) {
      currentView = v;
      localStorage.setItem('view', v);
      viewGroups.classList.toggle('active', v === 'groups');
      viewList.classList.toggle('active', v === 'list');
      renderContent();
    }

    viewGroups.addEventListener('click', () => setView('groups'));
    viewList.addEventListener('click',   () => setView('list'));
    if (currentView === 'list') setView('list');

    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('theme') || 'dark';
    if (savedTheme === 'light') applyTheme('light');

    themeToggle.addEventListener('click', () => {
      const next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
      applyTheme(next);
      localStorage.setItem('theme', next);
    });

    function applyTheme(theme) {
      if (theme === 'light') {
        document.documentElement.dataset.theme = 'light';
        themeToggle.textContent = 'Dark';
      } else {
        delete document.documentElement.dataset.theme;
        themeToggle.textContent = 'Light';
      }
    }

    document.getElementById('searchInput').addEventListener('input', e => {
      searchQuery = e.target.value.trim().toLowerCase();
      renderContent();
    });

    function renderTagFilter() {
      const container = document.getElementById('tagFilter');
      container.innerHTML = '<span class="filter-label">Filter:</span>';

      const allBtn = document.createElement('button');
      allBtn.className = 'tag-btn' + (selectedTags.size === 0 ? ' active' : '');
      allBtn.textContent = 'All';
      allBtn.onclick = () => { selectedTags.clear(); render(); };
      container.appendChild(allBtn);

      allTags.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'tag-btn' + (selectedTags.has(tag) ? ' active' : '');
        btn.textContent = tag;
        btn.onclick = () => {
          if (selectedTags.has(tag)) selectedTags.delete(tag);
          else selectedTags.add(tag);
          render();
        };
        container.appendChild(btn);
      });
    }

    function makeLi(tool, showMainTag, dimmed = false) {
      const li = document.createElement('li');
      if (dimmed) li.classList.add('dimmed');

      const row = document.createElement('div');
      row.className = 'row';

      const a = document.createElement('a');
      a.href = tool.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.title = tool.name;

      const favicon = document.createElement('img');
      favicon.className = 'tool-favicon' + (tool.invertFavicon ? ' invert' : '');
      favicon.src = tool.favicon ?? `https://www.google.com/s2/favicons?domain=${new URL(tool.url).hostname}&sz=32`;
      favicon.alt = '';
      a.appendChild(favicon);
      a.appendChild(document.createTextNode(tool.name));
      row.appendChild(a);

      const secondaryTags = showMainTag ? tool.tags : tool.tags.filter(t => t !== tool.main);
      if (secondaryTags.length) {
        const tagsEl = document.createElement('span');
        tagsEl.className = 'secondary-tags';
        secondaryTags.forEach(tag => {
          const s = document.createElement('span');
          s.className = 'stag';
          s.textContent = tag;
          tagsEl.appendChild(s);
        });
        row.appendChild(tagsEl);
      }

      li.appendChild(row);

      if (tool.desc) {
        const desc = document.createElement('span');
        desc.className = 'tool-desc';
        desc.textContent = tool.desc;
        li.appendChild(desc);
      }

      return li;
    }

    function renderContent() {
      const content = document.getElementById('content');
      const isFiltering = selectedTags.size > 0 || searchQuery !== '';

      const matchSet = new Set(
        tools
          .filter(t =>
            (selectedTags.size === 0 || t.tags.some(tag => selectedTags.has(tag))) &&
            (searchQuery === '' || t.name.toLowerCase().includes(searchQuery))
          )
          .map(t => t.name)
      );

      const countEl = document.getElementById('resultCount');
      countEl.textContent = !isFiltering
        ? `${tools.length} tools`
        : `Showing ${matchSet.size} of ${tools.length} tools`;

      content.innerHTML = '';

      if (currentView === 'groups') {
        const groups = {};
        tools.forEach(tool => {
          if (!groups[tool.main]) groups[tool.main] = [];
          groups[tool.main].push(tool);
        });

        const container = document.createElement('div');
        container.className = 'groups-container';

        Object.keys(groups).sort().forEach(groupName => {
          const group = document.createElement('div');
          group.className = 'group';

          const anyMatch = groups[groupName].some(t => matchSet.has(t.name));

          const header = document.createElement('div');
          header.className = 'group-header' + (isFiltering && !anyMatch ? ' dimmed' : '');
          header.innerHTML = `${groupName} <span class="group-count">${groups[groupName].length}</span>`;
          group.appendChild(header);

          const list = document.createElement('ul');
          list.className = 'tool-list';
          groups[groupName].forEach(tool =>
            list.appendChild(makeLi(tool, false, isFiltering && !matchSet.has(tool.name)))
          );
          group.appendChild(list);
          container.appendChild(group);
        });

        content.appendChild(container);
      } else {
        const container = document.createElement('div');
        container.className = 'list-container';

        const list = document.createElement('ul');
        list.className = 'tool-list';
        [...tools].sort((a, b) => a.name.localeCompare(b.name))
          .forEach(tool =>
            list.appendChild(makeLi(tool, true, isFiltering && !matchSet.has(tool.name)))
          );

        container.appendChild(list);
        content.appendChild(container);
      }
    }

    function render() {
      renderTagFilter();
      renderContent();
    }

    render();
  </script>
</body>
</html>
